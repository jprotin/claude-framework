# .pre-commit-config.yaml — Template standard (multi-langages)
# Installation : pip install pre-commit && pre-commit install
# Exécution manuelle : pre-commit run --all-files
# Adapter : commenter les sections inutiles selon les langages du projet.

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ---------- Transverses (toujours actifs) ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master", "--branch", "develop"]

  # ---------- Secrets ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # Créer baseline : detect-secrets scan > .secrets.baseline

  # ---------- Markdown ----------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # ---------- YAML ----------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  # ---------- Shell ----------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2", "-ci"]

  # ---------- Terraform ----------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--minimum-failure-severity=warning"
      - id: terraform_tfsec
      - id: terraform_checkov
        args:
          - "--args=--quiet"
          - "--args=--skip-check CKV_TF_1"

  # ---------- Docker ----------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker

  # ---------- SQL ----------
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.5
    hooks:
      - id: sqlfluff-lint
        # Créer .sqlfluff à la racine avec le dialect (postgres/mysql/bigquery…)
      - id: sqlfluff-fix

  # ---------- Ansible ----------
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.10.0
    hooks:
      - id: ansible-lint

  # ---------- Python ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: []

  # ---------- JS / TS ----------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or:
          [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss, html]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.14.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@9.14.0

  # ---------- PHP ----------
  - repo: https://github.com/digitalpulp/pre-commit-php
    rev: 1.4.0
    hooks:
      - id: php-cs-fixer
        files: \.php$
      - id: php-stan
        files: \.php$

  # ---------- Local custom hooks ----------
  - repo: local
    hooks:
      - id: no-todo-fixme-on-main
        name: Empêcher TODO/FIXME sans ticket
        entry: bash -c 'if git diff --cached | grep -E "^\+.*\b(TODO|FIXME|XXX)\b" | grep -v "#[0-9]\|[A-Z]+-[0-9]"; then echo "TODO/FIXME sans référence ticket détecté"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
